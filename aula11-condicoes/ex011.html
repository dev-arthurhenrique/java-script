<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nacionalidade</title>
</head>
<body>
   <h1>Nacionalidade</h1>
   <input type="text" name="pais_digitado" id="pais_digitado">
   <input type="button" value="Verificar" id="verificar">
   <div id="res"></div>
   <script>
    let verificar = document.getElementById('verificar')
    verificar.addEventListener('click', v)
    function v(){
        let pais_digitado = document.getElementById('pais_digitado')
        let res = document.getElementById('res')
        if(pais_digitado.value == 'Brasil'){
            res.innerHTML = 'Você é <strong>BRASILEIRO</strong>'
        }else{
            res.innerHTML = 'Você é <strong>ESTRANGEIRO</strong>'
        }
    }
   </script> 
</body>
</html>
