<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contando</title>
</head>
<body>
    <h1>Contando de 1 a 10 (marcando os pares)</h1>
    <input type="button" value="Contar de 1 a 10" id="verificar">
    <p>Aperte o botão acima para contar</p>
    <div id="res"></div>
    <script>
        let res = document.querySelector('div#res')
        let verificar = document.querySelector('input#verificar')
        verificar.addEventListener('click', clicar)
        function clicar(){
            res.innerHTML = `Contando de 1 até 10, marcando os pares`
            for(cont = 1; cont <= 10; cont ++){
                if(cont % 2 == 0){
                    res.innerHTML += `<mark>${cont}</mark> \u{1F449} `
                }else{
                    res.innerHTML += ` ${cont} \u{1F449} `
                }
            }res.innerHTML += `🏁`
        }
    </script>
</body>
</html>
