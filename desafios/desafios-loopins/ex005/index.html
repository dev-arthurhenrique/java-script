<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contando</title>
</head>
<body>
   <h1>Contando de 0 até qualquer número positivo qualquer</h1>
   <p>Escolha o limite final para a contagem a partir do 0 (digite apenas número POSITIVOS)</p> 
   <p>Valor final: <input type="number" name="num_final" id="num_final"> <input type="button" value="Contar" id="verificar"></p>
   <p>Preencha os dados acima e aperte o botão em verde</p>
   <div id="res"></div>
   <script>
    let res = document.getElementById('res')
    let verificar = document.getElementById('verificar')
    verificar.addEventListener('click', clicar)
    function clicar(){
        let num_final = document.getElementById('num_final')
        let n = Number(num_final.value)
        if(n < 0 || num_final.value.length == 0){
            alert('Informe um número POSITIVO')
        }else if(n > 1000){
            alert('Número muito alto. Você não vai conseguir EXPLODIR meu site (Digite até o número 1000 ou menos, por obséquio)')
        }else{
            res.innerHTML = `Contando de 0 até ${n}<br>`
            for(cont = 0; cont <= n; cont ++){
                res.innerHTML += `${cont} \u{1F449}`
            }res.innerHTML += `🏁`
        }
    }
   </script>
</body>
</html>
