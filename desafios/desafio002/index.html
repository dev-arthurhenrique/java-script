<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boas vindas</title>
    <style>
        body{
            text-align: center;
        }
        input{
            padding: 15px;
            border-radius: 15px;
            outline: none;
            border: none;
            background-color: rgb(221, 182, 134);
            color: rgb(255, 255, 255);
            font-size: 20px;
        }
        input:hover{
            background-color: rgb(231, 220, 206);
            color: rgb(177, 146, 109);
            transition: 0.2s;
        }
    </style>
</head>
<body>
    <h1>Boas-vindas</h1>
    <input type="button" value="Iniciar desafio" id="desafio">
    <script>
        let desafio = document.getElementById('desafio')
        desafio.addEventListener('click', d)
        function d(){
            let nome = prompt('Qual é o seu nome?')
            let idade = prompt(`É um prazer te conhecer, ${nome.toUpperCase()}! Quantos anos você tem? `)
            prompt(`Acabei de conhecer o ${nome}, que tem ${idade} anos de idade! eeeeeeeeeeeeeeeeeeeeeee`)
        }
    </script>
</body>
</html>
