<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mensagens</title>
</head>
<body>
   <h1>Desafio das mensagens</h1>
   <input type="button" value="Botão 1" id="botao1">
   <input type="button" value="Botão 2" id="botao2">
   <input type="button" value="Botão 3" id="botao3">
   <script>
    let botao1 = document.getElementById('botao1')
    let botao2 = document.getElementById('botao2')
    let botao3 = document.getElementById('botao3')
    botao1.addEventListener('click', b1)
    botao2.addEventListener('click', b2)
    botao3.addEventListener('click', b3)
    function b1(){
        alert('Você clicou no 1 botão')
    }
    function b2(){
        alert('Você clicou no 2 botão')
    }
    function b3(){
        alert('Você clicou no 3 botão')
    }
   </script> 
</body>
</html>
