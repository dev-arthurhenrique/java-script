<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>
    <style>
       div#area{
        background-image: radial-gradient(circle, rgb(197, 127, 255), rgb(199, 68, 199));
        width: 200px;
        height: 200px;
        text-align: center;
        line-height: 200px;
        font-size: 20px;
        font-family: Arial, Helvetica, sans-serif;
        color: aliceblue;
        border-radius: 15px;
       } 
    </style>
</head>
<body>
    <h1>Usando eventos <strong>DOM</strong></h1>
    <div id="area">INTERAJA</div>
    <script>
        let area = document.querySelector('div#area')
        area.addEventListener('mouseenter', entrar)
        area.addEventListener('click', clicar)
        area.addEventListener('mouseout', sair)
        function entrar(){
            area.style.background = 'lightblue'
            area.innerHTML = 'ENTROU'
        }
        function clicar(){
            area.style.background = 'pink'
            area.innerHTML = 'CLICOU'
        }
        function sair(){
            area.innerHTML = 'SAIU'
            area.style.background = 'red'
        }
    </script>
</body>
</html>
